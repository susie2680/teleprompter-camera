<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0f14" />
    <title>提示词相机</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <section class="stage" aria-label="摄像头预览">
        <video id="preview" class="preview mirrored" autoplay muted playsinline></video>
        <div class="camera-vignette" aria-hidden="true"></div>

        <div id="teleprompter" class="teleprompter position-top" aria-label="提词器">
          <div class="lens-marker">
            <span></span>
          </div>
          <div id="scriptTrack" class="script-track">
            <p id="scriptText" class="script-text">把文案粘贴到下方，点击“打开相机”，再开始录制。</p>
          </div>
        </div>

        <div class="top-bar">
          <div>
            <strong>提示词相机</strong>
            <span id="statusText">等待打开相机</span>
          </div>
          <div id="timer" class="timer">00:00</div>
        </div>

        <div id="countdown" class="countdown" hidden>3</div>
        <div class="primary-actions">
          <button id="cameraButton" type="button">打开相机</button>
          <button id="recordButton" type="button" class="record" disabled>开始录制</button>
          <button id="pauseButton" type="button" disabled>暂停滚动</button>
        </div>
      </section>

      <section class="controls" aria-label="控制面板">
        <label class="field">
          <span>文案</span>
          <textarea id="scriptInput" rows="5" placeholder="把口播文案粘贴到这里。建议每句话单独换行，眼睛移动会更小。"></textarea>
        </label>

        <div class="grid">
          <label class="field compact">
            <span>滚动速度</span>
            <input id="speedInput" type="range" min="3" max="80" value="20" />
          </label>
          <label class="field compact">
            <span>字号</span>
            <input id="fontInput" type="range" min="18" max="42" value="28" />
          </label>
          <label class="field compact">
            <span>文案透明底</span>
            <input id="opacityInput" type="range" min="0" max="70" value="24" />
          </label>
          <label class="field compact">
            <span>提词位置</span>
            <select id="positionInput">
              <option value="top" selected>靠近镜头</option>
              <option value="middle">屏幕中间</option>
              <option value="bottom">屏幕下方</option>
            </select>
          </label>
        </div>

        <div class="toggles">
          <label>
            <input id="mirrorInput" type="checkbox" checked />
            <span>镜像预览</span>
          </label>
          <label>
            <input id="autoScrollInput" type="checkbox" checked />
            <span>录制时自动滚动</span>
          </label>
        </div>

        <a id="downloadLink" class="download" hidden>下载录制视频</a>
        <button id="shareButton" type="button" class="download secondary" hidden>保存到手机</button>
        <p class="note">手机使用时，请用 HTTPS 地址打开。录制视频默认不包含屏幕上的文案。</p>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
